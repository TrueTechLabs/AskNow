name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  web-container:
    name: Build and Push Web Container
    runs-on: ubuntu-latest
    outputs:
      ghcr-image: ${{ steps.image.outputs.ghcr-image }}
      dockerhub-image: ${{ steps.image.outputs.dockerhub-image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Image Name
        id: image
        run: |
          GHCR_IMAGE="$(echo "ghcr.io/${GITHUB_REPOSITORY}/web" | tr '[:upper:]' '[:lower:]')"
          DOCKERHUB_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/asknow-web"
          echo "ghcr-image=${GHCR_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "dockerhub-image=${DOCKERHUB_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Check Docker Hub Secrets
        run: |
          test -n "${{ secrets.DOCKERHUB_USERNAME }}"
          test -n "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.image.outputs.ghcr-image }}
            ${{ steps.image.outputs.dockerhub-image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and Push Web Container
        uses: docker/build-push-action@v6
        with:
          context: web
          file: web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  macos-dmg:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift Version
        run: swift --version

      - name: Package DMG
        run: Scripts/package_dmg.sh

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AskNow-dmg
          path: .build/AskNow.dmg
          if-no-files-found: error

  github-release:
    name: Upload GitHub Release
    runs-on: ubuntu-latest
    needs:
      - web-container
      - macos-dmg

    steps:
      - name: Download DMG Artifact
        uses: actions/download-artifact@v4
        with:
          name: AskNow-dmg
          path: release-assets

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/AskNow.dmg
          generate_release_notes: true
          body: |
            Web container images:

            - `${{ needs.web-container.outputs.ghcr-image }}:${{ github.ref_name }}`
            - `${{ needs.web-container.outputs.dockerhub-image }}:${{ github.ref_name }}`
